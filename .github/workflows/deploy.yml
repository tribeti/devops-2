name: Deploy to WSL Runner

on:
  workflow_run:
    workflows: ["Build and Push GHCR Image"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/simple-reactjs
  CONTAINER_NAME: simple-reactjs
  HOST_PORT: 8081
  CONTAINER_PORT: 80

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configure Docker credentials store
        run: |
          mkdir -p ~/.docker
          echo '{}' > ~/.docker/config.json

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull latest image
        run: docker pull $REGISTRY/$IMAGE_NAME:latest

      - name: Stop old container
        run: |
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true

      - name: Run new container
        run: |
          docker run -d \
            --name $CONTAINER_NAME \
            --restart always \
            -p $HOST_PORT:$CONTAINER_PORT \
            $REGISTRY/$IMAGE_NAME:latest

      - name: Show running containers
        run: docker ps
